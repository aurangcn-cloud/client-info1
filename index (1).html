<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <!-- iOS: Add to Home Screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Client Info">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Android: Add to Home Screen support -->
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <title>Client Info - WhatsApp Fixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, rgba(8, 15, 18, 0.95), rgba(5, 10, 12, 0.98));
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(0, 250, 15, 0.35);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 250, 15, 0.1) inset, 0 0 30px rgba(0, 250, 15, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 30, 5, 0.4));
            padding: 24px 16px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 250, 15, 0.35);
            position: relative;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00FA0F, #00FA0F, #00FA0F, transparent);
        }

        .logo-main {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #FFFFFF;
            text-shadow: 0 0 15px rgba(0, 250, 15, 0.4);
            text-transform: uppercase;
        }
        .logo-brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #FFFFFF;
            margin-top: 6px;
            text-shadow: 0 0 10px rgba(0, 250, 15, 0.3);
            text-transform: uppercase;
        }
        .logo-divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00FA0F, #FFFFFF, #00FA0F, transparent);
            margin: 12px auto 14px auto;
            border-radius: 2px;
        }
        .client-info-title {
            font-size: 22px;
            letter-spacing: 3px;
            color: #FFFFFF;
            font-weight: 800;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(0, 250, 15, 0.25);
            text-transform: uppercase;
        }
        .developer-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 20px;
            background: rgba(0, 250, 15, 0.08);
            border-radius: 60px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFFFFF;
            border: 1px solid rgba(0, 250, 15, 0.4);
            backdrop-filter: blur(4px);
        }

        .form-area {
            padding: 22px 18px;
        }

        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            color: #FFFFFF;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            margin-left: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .input-group input, .input-group select {
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid rgba(0, 250, 15, 0.35);
            padding: 14px 18px;
            border-radius: 44px;
            color: #FFFFFF;
            font-family: -apple-system, monospace;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .input-group input::placeholder, .input-group select::placeholder {
            color: rgba(255, 255, 255, 0.4);
            text-transform: none;
        }

        .btn-primary {
            background: linear-gradient(115deg, #009909, #00FA0F);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 18px;
            font-family: -apple-system, system-ui;
            color: #000000;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 250, 15, 0.3);
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid #00FA0F;
            color: #FFFFFF;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            font-family: -apple-system, system-ui;
            transition: all 0.3s;
            font-size: 14px;
            backdrop-filter: blur(8px);
            text-transform: uppercase;
        }
        .btn-secondary:active {
            transform: scale(0.97);
            background: rgba(0, 250, 15, 0.1);
            color: #00FA0F;
        }

        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 14px;
        }
        .tab-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 250, 15, 0.35);
            padding: 10px;
            border-radius: 44px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            color: #FFFFFF;
            transition: all 0.2s;
            text-align: center;
            text-transform: uppercase;
        }
        .tab-btn.active {
            background: linear-gradient(115deg, #009909, #00FA0F);
            color: #000000;
            border-color: #00FA0F;
            box-shadow: 0 0 10px rgba(0, 250, 15, 0.3);
        }

        .preview-box {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 28px;
            padding: 18px;
            border: 1px solid rgba(0, 250, 15, 0.35);
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #FFFFFF;
            line-height: 1.75;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .history-list {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 28px;
            border: 1px solid rgba(0, 250, 15, 0.35);
            max-height: 280px;
            overflow-y: auto;
            padding: 8px;
        }
        .history-item {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid #00FA0F;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .history-item:active {
            transform: scale(0.98);
            background: rgba(0, 250, 15, 0.08);
        }
        .history-preview {
            font-size: 10px;
            color: #FFFFFF;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-time {
            font-size: 9px;
            color: #FFFFFF;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .delete-history {
            background: rgba(255, 100, 100, 0.8);
            border: none;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 9px;
            cursor: pointer;
            text-transform: none;
        }
        .empty-history {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding: 35px;
            font-size: 13px;
            text-transform: uppercase;
        }
        .clear-all-btn {
            background: rgba(255, 100, 100, 0.15);
            border: 1px solid #FF6666;
            color: #FFAAAA;
            padding: 8px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
            text-transform: uppercase;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #000000;
            backdrop-filter: blur(20px);
            color: #00FA0F;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 13px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 999;
            border: 1px solid #00FA0F;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 85%;
            text-transform: uppercase;
        }

        .footer {
            background: rgba(0, 0, 0, 0.7);
            padding: 14px 16px;
            text-align: center;
            border-top: 1px solid rgba(0, 250, 15, 0.25);
        }

        .tip-text {
            font-size: 10px;
            color: #FFFFFF;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .contact-info {
            font-size: 10px;
            color: #FFFFFF;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            text-transform: uppercase;
        }
        .contact-info span {
            background: rgba(0, 250, 15, 0.1);
            padding: 5px 14px;
            border-radius: 40px;
            font-family: monospace;
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .form-area { padding: 16px; }
            .logo-main { font-size: 26px; }
            .client-info-title { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo-main">SAAD</div>
            <div class="logo-brand">CYBERNET</div>
            <div class="logo-divider"></div>
            <div class="client-info-title">⭐ CLIENT INFO ⭐</div>
            <div class="developer-tag">DEVELOPER BY SHAMIM</div>
        </div>

        <div class="form-area">
            <div class="input-group">
                <label>👤 CLIENT NAME</label>
                <input type="text" id="name" placeholder="ENTER CLIENT NAME" value="">
            </div>
            <div class="input-group">
                <label>📞 PHONE NUMBER</label>
                <input type="tel" id="phone" placeholder="+8801XXXXXXXXX" value="" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>📍 SELECT AREA</label>
                <select id="area">
                    <option value="" disabled selected>-- SELECT AREA --</option>
                    <option>EIDGAH ROAD</option>
                    <option>SHORIF MARKET</option>
                    <option>SATAISH BAZAR</option>
                    <option>MURUBBI MARKET</option>
                    <option>MOLLA PARA</option>
                    <option>LOSKOR PARA</option>
                    <option>KOBIR MARKET</option>
                    <option>MATIA PARA</option>
                    <option>BANK PARA</option>
                    <option>NOYABARI</option>
                </select>
            </div>
            <div class="input-group">
                <label>🌐 IP ADDRESS</label>
                <input type="text" id="ip" placeholder="SAAD" value="">
            </div>
            <div class="input-group">
                <label>⚡ SELECT PACKAGE</label>
                <select id="package">
                    <option value="" disabled selected>-- SELECT PACKAGE --</option>
                    <option>5M</option>
                    <option>8M</option>
                    <option>10M</option>
                    <option>15M</option>
                </select>
            </div>
            <button class="btn-primary" id="generateBtn">✨ GENERATE MESSAGE ✨</button>
            <button class="btn-secondary" id="copyBtn">📋 COPY TO WHATSAPP</button>

            <div class="tab-buttons">
                <div class="tab-btn active" data-tab="preview">📄 PREVIEW</div>
                <div class="tab-btn" data-tab="history">📜 HISTORY</div>
            </div>

            <div id="previewPanel" class="preview-box"></div>
            <div id="historyPanel" class="history-list" style="display: none;"></div>
            <div id="clearAllBtn" class="clear-all-btn" style="display: none;">🗑️ CLEAR ALL HISTORY</div>
        </div>
        <div class="footer">
            <div class="tip-text">💡 টিপ: "কপি করুন" বাটনে চাপুন → হোয়াটসঅ্যাপে পেস্ট করুন → পারফেক্ট!</div>
            <div class="contact-info">
                <span>📞 +8801401000082</span>
                <span>📞 +8801401000083</span>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">✅ COPIED!</div>

    <script>
        function getCurrentDate() {
            let d = new Date();
            let day = d.getDate().toString().padStart(2, '0');
            let month = (d.getMonth() + 1).toString().padStart(2, '0');
            let year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function getCurrentTime() {
            let d = new Date();
            let hours = d.getHours();
            let minutes = d.getMinutes().toString().padStart(2, '0');
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return `${hours}:${minutes} ${ampm}`;
        }

        let messageHistory = [];

        function loadHistory() {
            let saved = localStorage.getItem('clientMessageHistory');
            if (saved) {
                try {
                    messageHistory = JSON.parse(saved);
                } catch(e) { messageHistory = []; }
            }
            renderHistory();
        }

        function saveHistory() {
            localStorage.setItem('clientMessageHistory', JSON.stringify(messageHistory));
            renderHistory();
        }

        function addToHistory(message) {
            let timestamp = new Date();
            let timeStr = `${timestamp.getDate().toString().padStart(2,'0')}/${(timestamp.getMonth()+1).toString().padStart(2,'0')}/${timestamp.getFullYear()} - ${timestamp.getHours().toString().padStart(2,'0')}:${timestamp.getMinutes().toString().padStart(2,'0')}`;
            messageHistory.unshift({ message: message, time: timeStr, id: Date.now() });
            if (messageHistory.length > 50) messageHistory = messageHistory.slice(0, 50);
            saveHistory();
        }

        function renderHistory() {
            let historyPanel = document.getElementById('historyPanel');
            if (!historyPanel) return;
            if (messageHistory.length === 0) {
                historyPanel.innerHTML = '<div class="empty-history">📭 NO MESSAGES GENERATED YET</div>';
                return;
            }
            let html = '';
            for (let item of messageHistory) {
                let previewMsg = item.message.replace(/\n/g, ' ').substring(0, 60);
                html += `<div class="history-item" data-id="${item.id}">
                            <div class="history-time"><span>🕐 ${item.time}</span><button class="delete-history" data-id="${item.id}">🗑️</button></div>
                            <div class="history-preview">${escapeHtml(previewMsg)}...</div>
                        </div>`;
            }
            historyPanel.innerHTML = html;
            document.querySelectorAll('.delete-history').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); deleteHistoryItem(parseInt(btn.dataset.id)); });
            });
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-history')) return;
                    let found = messageHistory.find(h => h.id === parseInt(item.dataset.id));
                    if (found) {
                        document.getElementById('previewPanel').innerText = found.message;
                        showToast('📜 MESSAGE LOADED TO PREVIEW');
                        document.querySelector('.tab-btn[data-tab="preview"]').click();
                    }
                });
            });
        }
        
        function deleteHistoryItem(id) { messageHistory = messageHistory.filter(i => i.id !== id); saveHistory(); showToast('🗑️ MESSAGE DELETED'); }
        function clearAllHistory() { if(messageHistory.length) { messageHistory = []; saveHistory(); showToast('🗑️ ALL HISTORY CLEARED'); } else showToast('📭 NO MESSAGES'); }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        function generateFixedMessage() {
            let name = document.getElementById('name').value.trim().toUpperCase();
            let phone = document.getElementById('phone').value.trim();
            let area = document.getElementById('area').value.toUpperCase();
            let ip = document.getElementById('ip').value.trim().toUpperCase();
            let pkg = document.getElementById('package').value;

            if (!name) { showToast('⚠️ PLEASE ENTER CLIENT NAME'); return null; }
            if (!phone) { showToast('⚠️ PLEASE ENTER PHONE NUMBER'); return null; }
            if (!area || area.includes('SELECT')) { showToast('⚠️ PLEASE SELECT AREA'); return null; }
            if (!ip) { showToast('⚠️ PLEASE ENTER IP ADDRESS'); return null; }
            if (!pkg || pkg.includes('SELECT')) { showToast('⚠️ PLEASE SELECT PACKAGE'); return null; }

            let todayDate = getCurrentDate();
            let nowTime = getCurrentTime();

            let msg = `⭐ CLIENT INFO ⭐\n` +
                      `━━━━━━━━━━━━━━━━\n` +
                      `📅 DATE: ${todayDate}\n` +
                      `🕒 TIME: ${nowTime}\n` +
                      `👤 NAME: ${name}\n` +
                      `📞 PHONE: ${phone}\n` +
                      `📍 AREA: ${area}\n` +
                      `🌐 IP: ${ip}\n` +
                      `📡 PACKAGE: ${pkg}\n` +
                      `━━━━━━━━━━━━━━━━`;
            return msg;
        }

        function updatePreview() { let msg = generateFixedMessage(); if (msg) document.getElementById('previewPanel').innerText = msg; return msg; }
        function showToast(msg) { let toast = document.getElementById('toast'); toast.innerText = msg; toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) scale(1)'; setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) scale(0.9)'; }, 2000); }

        document.getElementById('generateBtn').addEventListener('click', () => { let msg = generateFixedMessage(); if(msg) { updatePreview(); addToHistory(msg); showToast('✨ MESSAGE GENERATED!'); } });
        document.getElementById('copyBtn').addEventListener('click', async () => { let msg = document.getElementById('previewPanel').innerText; if (!msg || !msg.includes('CLIENT INFO')) { msg = generateFixedMessage(); if(!msg) return; updatePreview(); } try { await navigator.clipboard.writeText(msg); showToast('✅ COPIED! PASTE ON WHATSAPP'); } catch(err) { let ta = document.createElement('textarea'); ta.value = msg; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('✅ COPIED! PASTE ON WHATSAPP'); } });

        let previewPanel = document.getElementById('previewPanel'), historyPanel = document.getElementById('historyPanel'), clearBtn = document.getElementById('clearAllBtn');
        document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); if(btn.dataset.tab === 'preview') { previewPanel.style.display = 'block'; historyPanel.style.display = 'none'; clearBtn.style.display = 'none'; updatePreview(); } else { previewPanel.style.display = 'none'; historyPanel.style.display = 'block'; clearBtn.style.display = 'block'; renderHistory(); } }); });
        clearBtn.addEventListener('click', () => clearAllHistory());
        loadHistory();
    </script>
</body>
</html>
